<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Candidate AI Insights Hub</title>
    <link rel="stylesheet" href="/static/styles.css">
    <!-- Load React UMD builds -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Load Babel Standalone to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      {% raw %}
      const { useState, useEffect, useRef } = React;

      // Inline SVG Icon components for reliability and performance
      const IconDashboard = () => (
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor">
          <rect width="7" height="9" x="3" y="3" rx="1" />
          <rect width="7" height="5" x="14" y="3" rx="1" />
          <rect width="7" height="9" x="14" y="12" rx="1" />
          <rect width="7" height="5" x="3" y="16" rx="1" />
        </svg>
      );

      const IconBriefcase = () => (
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" d="M20.25 14.15v4.25c0 .621-.504 1.125-1.125 1.125H4.875c-.621 0-1.125-.504-1.125-1.125v-4.25m16.5 0a2.25 2.25 0 00-1.808-2.203l-3.707-.705a2.25 2.25 0 00-1.562.324l-1.95 1.4c-.582.418-1.364.418-1.946 0l-1.95-1.4a2.25 2.25 0 00-1.561-.324l-3.71.705a2.25 2.25 0 00-1.807 2.203m16.5 0a2.25 2.25 0 01-1.808 2.203l-3.707.705a2.25 2.25 0 01-1.562-.324l-1.95-1.4a2.25 2.25 0 01-1.946 0l-1.95 1.4a2.25 2.25 0 01-1.561.324l-3.71-.705a2.25 2.25 0 01-1.807-2.203M8.25 6.75h7.5M8.25 9h7.5M3.75 6.75h16.5M4.5 9h15" />
        </svg>
      );

      const IconFileText = () => (
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
        </svg>
      );

      const IconVideo = () => (
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" d="M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z" />
          <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 10.5l-4.5-3v6l4.5-3z" />
        </svg>
      );

      const IconUpload = () => (
        <svg className="upload-icon" width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.5">
          <path strokeLinecap="round" strokeLinejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5h10.5a2.25 2.25 0 002.25-2.25v-10.5a2.25 2.25 0 00-2.25-2.25H6.75A2.25 2.25 0 004.5 6.75v10.5a2.25 2.25 0 002.25 2.25z" />
        </svg>
      );

      const IconTrash = () => (
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
          <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
        </svg>
      );

      const IconCheck = () => (
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5">
          <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
      );

      // Toast Notification Component
      function Toast({ message, type, onClose }) {
        useEffect(() => {
          const timer = setTimeout(onClose, 3500);
          return () => clearTimeout(timer);
        }, [onClose]);

        return (
          <div className={`toast ${type}`}>
            <span>{message}</span>
            <button onClick={onClose} style={{background: 'none', border: 'none', color: '#fff', cursor: 'pointer', marginLeft: '12px', fontSize: '1rem'}}>×</button>
          </div>
        );
      }

      // Gauge Circular Progress Chart Component
      function RadialGauge({ score }) {
        const radius = 30;
        const circumference = 2 * Math.PI * radius;
        const offset = circumference - (score / 100) * circumference;
        
        let color = "var(--accent-rose)";
        if (score >= 70) color = "var(--accent-emerald)";
        else if (score >= 40) color = "var(--accent-primary)";

        return (
          <div className="match-score-gauge">
            <svg width="80" height="80" className="gauge-svg">
              <circle cx="40" cy="40" r={radius} className="gauge-bg" />
              <circle 
                cx="40" 
                cy="40" 
                r={radius} 
                className="gauge-fill" 
                stroke={color}
                strokeDasharray={circumference}
                strokeDashoffset={offset}
              />
            </svg>
            <span className="match-score-text">{score}%</span>
          </div>
        );
      }

      // App Container
      function App() {
        const [activeTab, setActiveTab] = useState("overview");
        const [jobs, setJobs] = useState([]);
        const [loading, setLoading] = useState(false);
        const [uploading, setUploading] = useState(false);
        const [toast, setToast] = useState(null);
        
        const [resumeResult, setResumeResult] = useState(null);
        const [interviewResult, setInterviewResult] = useState(null);

        const fetchJobs = async () => {
          try {
            const res = await fetch("/api/jobs");
            const data = await res.json();
            if (data.success) {
              setJobs(data.jobs);
            } else {
              showToast("Failed to load jobs", "danger");
            }
          } catch (err) {
            showToast("Network error loading jobs", "danger");
          }
        };

        useEffect(() => {
          fetchJobs();
        }, []);

        const showToast = (message, type = "info") => {
          setToast({ message, type });
        };

        const handleJobUpload = async (e) => {
          const files = e.target.files;
          if (!files || files.length === 0) return;

          setUploading(true);
          const formData = new FormData();
          for (let i = 0; i < files.length; i++) {
            formData.append("job_files", files[i]);
          }

          try {
            const res = await fetch("/api/upload-job", {
              method: "POST",
              body: formData
            });
            const data = await res.json();
            if (data.success) {
              showToast(`Successfully uploaded ${files.length} job(s)`, "success");
              fetchJobs();
            } else {
              showToast(data.error || "Upload failed", "danger");
            }
          } catch (err) {
            showToast("Error connecting to server", "danger");
          } finally {
            setUploading(false);
          }
        };

        const handleDeleteJob = async (filename) => {
          try {
            const res = await fetch(`/api/delete-job/${filename}`, {
              method: "DELETE"
            });
            const data = await res.json();
            if (data.success) {
              showToast("Job description removed", "success");
              fetchJobs();
            } else {
              showToast(data.error || "Failed to delete job", "danger");
            }
          } catch (err) {
            showToast("Network error deleting job", "danger");
          }
        };

        const handleResumeUpload = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          setUploading(true);
          const formData = new FormData();
          formData.append("resume_file", file);

          try {
            const res = await fetch("/api/upload-resume", {
              method: "POST",
              body: formData
            });
            const data = await res.json();
            if (data.success) {
              setResumeResult({
                name: data.resume.name,
                skills: data.resume.skills,
                experience: data.resume.experience,
                education: data.resume.education,
                matches: data.matches
              });
              showToast("Resume parsed and matches scored", "success");
            } else {
              showToast(data.error || "Upload failed", "danger");
            }
          } catch (err) {
            showToast("Network error uploading resume", "danger");
          } finally {
            setUploading(false);
          }
        };

        const handleInterviewUpload = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          setUploading(true);
          const formData = new FormData();
          formData.append("interview_file", file);

          try {
            const res = await fetch("/api/upload-interview", {
              method: "POST",
              body: formData
            });
            const data = await res.json();
            if (data.success) {
              setInterviewResult(data.summary);
              showToast("Interview segments stored and analyzed", "success");
            } else {
              showToast(data.error || "Upload failed", "danger");
            }
          } catch (err) {
            showToast("Network error uploading interview", "danger");
          } finally {
            setUploading(false);
          }
        };

        return (
          <div className="app-container">
            {/* Sidebar Navigation */}
            <aside className="sidebar">
              <div>
                <div className="brand">
                  <div className="brand-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                  </div>
                  <span className="brand-title">Antigravity RAG</span>
                </div>
                <nav className="nav-links">
                  <div className={`nav-item ${activeTab === "overview" ? "active" : ""}`} onClick={() => setActiveTab("overview")}>
                    <IconDashboard />
                    <span>Overview</span>
                  </div>
                  <div className={`nav-item ${activeTab === "jobs" ? "active" : ""}`} onClick={() => setActiveTab("jobs")}>
                    <IconBriefcase />
                    <span>Job Board</span>
                  </div>
                  <div className={`nav-item ${activeTab === "resumes" ? "active" : ""}`} onClick={() => setActiveTab("resumes")}>
                    <IconFileText />
                    <span>Resume Match</span>
                  </div>
                  <div className={`nav-item ${activeTab === "interviews" ? "active" : ""}`} onClick={() => setActiveTab("interviews")}>
                    <IconVideo />
                    <span>Interviews</span>
                  </div>
                </nav>
              </div>
              <div className="sidebar-footer">
                <p>System Active</p>
                <p style={{fontSize: '0.7rem', marginTop: '4px'}}>v2.0.0 (React SPA)</p>
              </div>
            </aside>

            {/* Main view content */}
            <main className="main-content">
              {/* Header Title Section */}
              <div className="header-wrapper">
                <div className="title-section">
                  {activeTab === "overview" && (
                    <>
                      <h1>Insights Dashboard</h1>
                      <p>Analyze applicant records, screen skills, and index interview transcripts dynamically.</p>
                    </>
                  )}
                  {activeTab === "jobs" && (
                    <>
                      <h1>Job Board Manager</h1>
                      <p>Upload new target jobs or manage existing roles for the candidate match engine.</p>
                    </>
                  )}
                  {activeTab === "resumes" && (
                    <>
                      <h1>Resume Match Analytics</h1>
                      <p>Upload candidate files (PDF/DOCX/TXT) to compare core skills and scoring coefficients.</p>
                    </>
                  )}
                  {activeTab === "interviews" && (
                    <>
                      <h1>RAG Video Analysis</h1>
                      <p>Index video records in the FAISS store to retrieve communication quality insights.</p>
                    </>
                  )}
                </div>
              </div>

              {/* Loader */}
              {uploading && (
                <div className="glass-panel spinner-container">
                  <div className="spinner"></div>
                  <p>Processing payload... Please stand by</p>
                </div>
              )}

              {/* OVERVIEW TAB */}
              {activeTab === "overview" && !uploading && (
                <div style={{animation: 'fadeIn 0.3s ease-out'}}>
                  <div className="stats-grid">
                    <div className="stat-card">
                      <div className="stat-icon purple">
                        <IconBriefcase />
                      </div>
                      <div className="stat-info">
                        <h3>Total Jobs Listed</h3>
                        <p>{jobs.length}</p>
                      </div>
                    </div>
                    <div className="stat-card">
                      <div className="stat-icon blue">
                        <IconFileText />
                      </div>
                      <div className="stat-info">
                        <h3>Custom Uploads</h3>
                        <p>{jobs.filter(j => j.filename).length}</p>
                      </div>
                    </div>
                    <div className="stat-card">
                      <div className="stat-icon cyan">
                        <IconVideo />
                      </div>
                      <div className="stat-info">
                        <h3>RAG Store Status</h3>
                        <p>Persistent (FAISS)</p>
                      </div>
                    </div>
                  </div>

                  <div className="glass-panel">
                    <div className="panel-header">
                      <h2>System Capabilities</h2>
                    </div>
                    <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '20px', lineHeight: '1.6'}}>
                      <div style={{background: 'rgba(255,255,255,0.02)', padding: '20px', borderRadius: '12px', border: '1px solid var(--glass-border)'}}>
                        <h3 style={{color: 'var(--accent-primary)', marginBottom: '8px'}}>1. Job Board Sourcing</h3>
                        <p style={{color: 'var(--text-secondary)', fontSize: '0.9rem'}}>Accepts raw text or nested JSON listings. Creates target vectors that shape candidates' match score assessments.</p>
                      </div>
                      <div style={{background: 'rgba(255,255,255,0.02)', padding: '20px', borderRadius: '12px', border: '1px solid var(--glass-border)'}}>
                        <h3 style={{color: 'var(--accent-cyan)', marginBottom: '8px'}}>2. Parser & Matcher</h3>
                        <p style={{color: 'var(--text-secondary)', fontSize: '0.9rem'}}>Extracts name header details, parses qualification parameters, and computes overall alignment matrices in real-time.</p>
                      </div>
                      <div style={{background: 'rgba(255,255,255,0.02)', padding: '20px', borderRadius: '12px', border: '1px solid var(--glass-border)'}}>
                        <h3 style={{color: 'var(--accent-secondary)', marginBottom: '8px'}}>3. RAG Semantic Search</h3>
                        <p style={{color: 'var(--text-secondary)', fontSize: '0.9rem'}}>Segments long-form interview records, generates sentence embeddings, and retrieves contextual highlights for quality evaluation.</p>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* JOBS TAB */}
              {activeTab === "jobs" && !uploading && (
                <div style={{animation: 'fadeIn 0.3s ease-out'}}>
                  <div className="glass-panel">
                    <div className="panel-header">
                      <h2>Upload Job Descriptions</h2>
                    </div>
                    <div className="upload-zone">
                      <IconUpload />
                      <p className="upload-text">Drag files here or click to browse</p>
                      <p className="upload-hint">Supports multiple files in .json or .txt format</p>
                      <input type="file" multiple accept=".json,.txt" onChange={handleJobUpload} />
                    </div>
                  </div>

                  <div className="glass-panel">
                    <div className="panel-header">
                      <h2>Active Positions ({jobs.length})</h2>
                    </div>
                    <div className="jobs-grid">
                      {jobs.map((job, idx) => (
                        <div key={idx} className="job-card">
                          <div>
                            <div className="job-card-header">
                              <h3 className="job-card-title">{job.title}</h3>
                              {job.filename && (
                                <button 
                                  className="btn btn-danger btn-sm" 
                                  onClick={() => handleDeleteJob(job.filename)}
                                  title="Delete Job"
                                >
                                  <IconTrash />
                                </button>
                              )}
                            </div>
                            <p className="job-card-desc">{job.description}</p>
                          </div>
                          <div>
                            <h4 style={{fontSize: '0.8rem', color: 'var(--text-muted)', marginBottom: '6px'}}>REQUISITE SKILLS:</h4>
                            <div className="skills-wrapper">
                              {job.skills && job.skills.map((skill, sIdx) => (
                                <span key={sIdx} className="badge badge-indigo">{skill}</span>
                              ))}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* RESUME MATCH TAB */}
              {activeTab === "resumes" && !uploading && (
                <div style={{animation: 'fadeIn 0.3s ease-out'}}>
                  <div className="glass-panel">
                    <div className="panel-header">
                      <h2>Process Applicant Profile</h2>
                    </div>
                    <div className="upload-zone">
                      <IconUpload />
                      <p className="upload-text">Upload Candidate Resume</p>
                      <p className="upload-hint">Supports .pdf, .docx, or .txt files</p>
                      <input type="file" accept=".pdf,.docx,.txt" onChange={handleResumeUpload} />
                    </div>
                  </div>

                  {resumeResult && (
                    <div className="resume-layout" style={{animation: 'fadeIn 0.3s ease-out'}}>
                      {/* Left: profile */}
                      <div className="candidate-profile-card">
                        <div className="candidate-name">{resumeResult.name}</div>
                        
                        <div className="section-subtitle">Core Skills</div>
                        <div className="skills-wrapper">
                          {resumeResult.skills.map((s, idx) => (
                            <span key={idx} className="badge badge-indigo">{s}</span>
                          ))}
                        </div>

                        <div className="section-subtitle">Experience Snippets</div>
                        <ul className="list-items">
                          {resumeResult.experience.map((exp, idx) => (
                            <li key={idx}>{exp}</li>
                          ))}
                        </ul>

                        <div className="section-subtitle">Education History</div>
                        <ul className="list-items">
                          {resumeResult.education.map((edu, idx) => (
                            <li key={idx}>{edu}</li>
                          ))}
                        </ul>
                      </div>

                      {/* Right: scores */}
                      <div className="glass-panel" style={{margin: 0}}>
                        <div className="panel-header">
                          <h2>Cross-Position Scored Rankings</h2>
                        </div>
                        <div className="matching-results-list">
                          {resumeResult.matches.map((match, idx) => (
                            <div key={idx} className="match-item">
                              <div className="match-left">
                                <h3 style={{color: '#fff', fontSize: '1.15rem', marginBottom: '4px'}}>{match.title}</h3>
                                <p style={{color: 'var(--text-secondary)', fontSize: '0.85rem', marginBottom: '14px'}}>{match.description}</p>
                                
                                <div style={{marginBottom: '8px'}}>
                                  <span style={{fontSize: '0.75rem', fontWeight: '700', color: 'var(--text-muted)', display: 'block', marginBottom: '4px'}}>MATCHED SKILLS:</span>
                                  <div className="skills-wrapper">
                                    {match.matched_skills.map((s, sidx) => (
                                      <span key={sidx} className="badge badge-emerald">{s}</span>
                                    ))}
                                    {match.matched_skills.length === 0 && <span style={{fontSize: '0.8rem', color: 'var(--text-muted)'}}>None</span>}
                                  </div>
                                </div>

                                <div>
                                  <span style={{fontSize: '0.75rem', fontWeight: '700', color: 'var(--text-muted)', display: 'block', marginBottom: '4px'}}>MISSING SKILLS:</span>
                                  <div className="skills-wrapper">
                                    {match.missing_skills.map((s, sidx) => (
                                      <span key={sidx} className="badge badge-rose">{s}</span>
                                    ))}
                                    {match.missing_skills.length === 0 && <span style={{fontSize: '0.8rem', color: 'var(--text-muted)'}}>None</span>}
                                  </div>
                                </div>
                              </div>
                              <RadialGauge score={match.score} />
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* INTERVIEWS TAB */}
              {activeTab === "interviews" && !uploading && (
                <div style={{animation: 'fadeIn 0.3s ease-out'}}>
                  <div className="glass-panel">
                    <div className="panel-header">
                      <h2>Vector Index Interview Transcripts</h2>
                    </div>
                    <div className="upload-zone">
                      <IconUpload />
                      <p className="upload-text">Upload Interview Video Record</p>
                      <p className="upload-hint">Supports video container files in .mp4, .webm, or .avi</p>
                      <input type="file" accept=".mp4,.webm,.avi" onChange={handleInterviewUpload} />
                    </div>
                  </div>

                  {interviewResult && (
                    <div className="glass-panel" style={{animation: 'fadeIn 0.3s ease-out'}}>
                      <div className="panel-header">
                        <h2>Interview Summary & Soft-Skill RAG Output</h2>
                      </div>
                      <h3 style={{fontSize: '1.2rem', color: '#fff', marginBottom: '20px'}}>{interviewResult.video}</h3>
                      
                      <div className="interview-summary-card">
                        {/* Analysis & Recommendations */}
                        <div className="summary-block">
                          <h4 style={{color: 'var(--accent-primary)', fontSize: '0.95rem', fontWeight: '700', marginBottom: '12px'}}>ANALYSIS FEEDBACK</h4>
                          <p style={{lineHeight: '1.6', fontSize: '0.95rem', color: 'var(--text-secondary)', marginBottom: '24px'}}>{interviewResult.analysis}</p>
                          
                          <h4 style={{color: 'var(--accent-cyan)', fontSize: '0.95rem', fontWeight: '700', marginBottom: '12px'}}>FOLLOW-UP RECOMMENDATION</h4>
                          <p style={{lineHeight: '1.6', fontSize: '0.95rem', color: 'var(--text-secondary)'}}>{interviewResult.recommendation}</p>
                        </div>

                        {/* Retrieved insights (RAG segments) */}
                        <div className="summary-block">
                          <h4 style={{color: 'var(--accent-secondary)', fontSize: '0.95rem', fontWeight: '700', marginBottom: '12px'}}>RETRIEVED TRANSCRIPT SEGMENTS</h4>
                          <div>
                            {interviewResult.insights.map((insight, idx) => (
                              <div key={idx} className="insight-item">
                                {insight}
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </main>

            {/* Float alerts */}
            {toast && (
              <div className="toast-container">
                <Toast 
                  message={toast.message} 
                  type={toast.type} 
                  onClose={() => setToast(null)} 
                />
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
